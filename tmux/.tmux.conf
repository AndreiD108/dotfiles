# ─── Prefix ───────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# ─── Colors (true color) ─────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ─── Hygiene defaults ────────────────────────────────────────────────────────
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 0
set -g focus-events on
set -g status-position top
set -s set-clipboard on
setw -g monitor-activity on
set -g visual-activity off

# ─── Key bindings ────────────────────────────────────────────────────────────
# Splits and new windows open in the current pane's directory
bind c new-window      -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"

# Intuitive split keys: | for left/right, - for top/bottom
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded"

# ─── Statusline (Catppuccin Mocha — matches starship) ────────────────────────
set -g status-style                 "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length           40
set -g status-left                  "#[fg=#11111b,bg=#cba6f7,bold] #S #[fg=#cba6f7,bg=#1e1e2e] "
set -g status-right                 "#[fg=#a6adc8]%Y-%m-%d #[fg=#cdd6f4]%H:%M "
set -g window-status-current-format "#[fg=#1e1e2e,bg=#fab387,bold] #I:#W #[fg=#fab387,bg=#1e1e2e]"
set -g window-status-format         "#[fg=#a6adc8] #I:#W "
set -g pane-active-border-style     "fg=#b4befe"
set -g pane-border-style            "fg=#313244"
set -g message-style                "bg=#cba6f7,fg=#11111b"
